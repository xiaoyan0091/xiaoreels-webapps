<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOD Premium</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
/* ═══════════════════════════════════════════
   ROOT & RESET — PREMIUM ENHANCED
═══════════════════════════════════════════ */
:root {
    --bg:         #050510;
    --card:       #0c0c20;
    --card-edge:  #12122e;
    --prim:       #ff1f3a;
    --prim2:      #ff784b;
    --vio:        #9b6eff;
    --vio2:       #c997ff;
    --cyan:       #1ef6ff;
    --gold:       #ffd966;
    --txt:        #f0f0ff;
    --muted:      #5e5e8a;
    --glow-r:     rgba(255,31,58,0.6);
    --glow-v:     rgba(155,110,255,0.6);
    --glow-c:     rgba(30,246,255,0.3);
    --glass:      rgba(18,18,45,0.65);
    --glass-edge: rgba(155,110,255,0.2);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
    font-family: 'Outfit', sans-serif;
    background: radial-gradient(circle at 10% 20%, #0a0a1a, #020208);
    color: var(--txt);
    overflow-x: hidden;
    padding-bottom: 84px;
    min-height: 100vh;
}

/* ========== 3D SPACE BACKGROUND ========== */
#bgScene {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
}
.star-field {
    position: absolute;
    width: 100%;
    height: 100%;
    background: transparent;
}
.grid-floor {
    position: absolute;
    bottom: -15%;
    left: 50%;
    transform: translateX(-50%) rotateX(70deg) translateZ(-80px);
    width: 200%;
    height: 200%;
    background-image: 
        linear-gradient(rgba(155,110,255,0.12) 1px, transparent 1px),
        linear-gradient(90deg, rgba(155,110,255,0.12) 1px, transparent 1px);
    background-size: 55px 55px;
    animation: gridDrift 20s linear infinite;
    opacity: 0.6;
}
@keyframes gridDrift {
    0% { transform: translateX(-50%) rotateX(70deg) translateZ(-80px) translateY(0); }
    100% { transform: translateX(-50%) rotateX(70deg) translateZ(-80px) translateY(55px); }
}
.orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(70px);
    animation: orbPulse 12s ease-in-out infinite alternate;
}
.orb1 { width: 320px; height: 320px; background: rgba(155,110,255,0.12); top: -100px; left: -80px; }
.orb2 { width: 260px; height: 260px; background: rgba(255,31,58,0.1); top: 40%; right: -60px; animation-delay: -4s; }
.orb3 { width: 200px; height: 200px; background: rgba(30,246,255,0.08); bottom: 15%; left: 10%; animation-delay: -7s; }
@keyframes orbPulse {
    0% { transform: scale(1) translateY(0); opacity: 0.4; }
    100% { transform: scale(1.2) translateY(-30px); opacity: 0.9; }
}

/* ========== HEADER — GLASS LUXURY ========== */
.header {
    padding: 14px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 500;
    background: rgba(8,8,28,0.75);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid rgba(155,110,255,0.3);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 40px rgba(155,110,255,0.1);
}
.app-title {
    font-size: 20px;
    font-weight: 900;
    background: linear-gradient(135deg, #FFFFFF, #c997ff, #ff1f3a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    letter-spacing: -0.3px;
    filter: drop-shadow(0 0 12px rgba(155,110,255,0.5));
}
.user-profile {
    display: flex;
    align-items: center;
    gap: 12px;
}
.user-info-text {
    text-align: right;
}
.user-name {
    font-size: 14px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff, #c997ff);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
}
.user-id {
    font-size: 10px;
    color: var(--muted);
}
.user-avatar {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    border: 2px solid transparent;
    background: linear-gradient(135deg, #9b6eff, #ff1f3a) border-box;
    box-shadow: 0 0 0 3px rgba(155,110,255,0.2), 0 8px 20px rgba(0,0,0,0.3);
}

/* ========== VIEW SECTIONS ========== */
.view-section {
    display: none;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.4s ease, transform 0.4s ease;
}
.view-section.active {
    display: block;
    opacity: 1;
    transform: translateY(0);
}

/* ========== SEARCH BAR ELEGANT ========== */
.search-container {
    padding: 20px 18px 6px;
}
.search-wrapper {
    position: relative;
}
.search-bar {
    width: 100%;
    padding: 16px 20px 16px 48px;
    border-radius: 60px;
    border: none;
    background: rgba(18,18,45,0.8);
    backdrop-filter: blur(10px);
    color: white;
    font-size: 15px;
    font-weight: 500;
    outline: none;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
    transition: all 0.3s;
}
.search-bar:focus {
    background: rgba(25,25,60,0.95);
    box-shadow: 0 0 0 2px rgba(155,110,255,0.5), 0 8px 25px rgba(0,0,0,0.4);
}
.search-icon {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    color: #9b6eff;
    width: 18px;
    height: 18px;
}

/* ========== FILTER CHIPS PREMIUM ========== */
.filter-container {
    display: flex;
    gap: 12px;
    padding: 16px 18px;
    overflow-x: auto;
    scrollbar-width: none;
}
.filter-btn {
    padding: 10px 22px;
    border-radius: 40px;
    background: rgba(18,18,45,0.7);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(155,110,255,0.3);
    color: #b0b0dd;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.25s;
}
.filter-btn.active {
    background: linear-gradient(135deg, #9b6eff, #ff1f3a);
    border: none;
    color: white;
    box-shadow: 0 4px 15px rgba(155,110,255,0.5);
    transform: scale(1.02);
}

/* ========== HERO BANNER 3D GLASS ========== */
.hero-wrap {
    padding: 8px 18px 18px;
    perspective: 1000px;
}
.hero-banner {
    border-radius: 28px;
    overflow: hidden;
    position: relative;
    height: 250px;
    cursor: pointer;
    transform: rotateX(3deg) rotateY(0deg);
    transition: transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1), box-shadow 0.3s;
    box-shadow: 0 25px 40px -12px black, 0 0 0 1px rgba(155,110,255,0.3);
}
.hero-banner:hover {
    transform: rotateX(0deg) rotateY(2deg) scale(1.01);
}
.hero-banner img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.6s;
}
.hero-banner img.loaded {
    opacity: 1;
}
.hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(0deg, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.2) 70%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 24px;
}
.hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    font-weight: 800;
    padding: 4px 14px;
    border-radius: 30px;
    width: fit-content;
    margin-bottom: 10px;
    letter-spacing: 1px;
}
.hero-badge.prem {
    background: rgba(255,31,58,0.2);
    border: 1px solid #ff1f3a;
    color: #ff8a9f;
}
.hero-badge.free {
    background: rgba(30,246,255,0.15);
    border: 1px solid #1ef6ff;
    color: #9efaff;
}
.hero-title {
    font-size: 26px;
    font-weight: 900;
    line-height: 1.2;
    text-shadow: 0 2px 10px black;
}
.hero-cta {
    margin-top: 14px;
    background: linear-gradient(95deg, #ff1f3a, #ff784b);
    border: none;
    padding: 8px 20px;
    border-radius: 40px;
    color: white;
    font-weight: 800;
    font-size: 12px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: fit-content;
    cursor: pointer;
    box-shadow: 0 5px 12px rgba(255,31,58,0.4);
}

/* ========== SECTION LABEL ========== */
.section-label {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 6px 20px 14px;
    font-size: 12px;
    font-weight: 800;
    color: var(--muted);
    letter-spacing: 2px;
}
.section-label::before {
    content: '';
    width: 26px;
    height: 4px;
    background: linear-gradient(90deg, #9b6eff, #ff1f3a);
    border-radius: 4px;
}

/* ========== GRID CARDS — SMOOTH PREMIUM ========== */
.grid-container {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 18px;
    padding: 0 18px 30px;
}
.movie-card {
    border-radius: 22px;
    background: rgba(12,12,32,0.6);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(155,110,255,0.2);
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
    box-shadow: 0 12px 25px -12px black;
}
.movie-card:active {
    transform: scale(0.97);
}
.movie-poster-container {
    position: relative;
    width: 100%;
    padding-top: 140%;
    background: linear-gradient(145deg, #0a0a20, #111128);
    cursor: pointer;
    overflow: hidden;
}
.movie-poster-container img {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 0.4s, transform 0.8s;
}
.movie-poster-container img.loaded {
    opacity: 1;
}
.play-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
}
.play-overlay-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(135deg, #ff1f3a, #ff784b);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.5);
    transition: 0.2s;
}
.movie-poster-container:active .play-overlay {
    background: rgba(0,0,0,0.4);
}
.movie-poster-container:active .play-overlay-icon {
    opacity: 1;
    transform: scale(1);
}
.movie-info {
    padding: 12px 12px 14px;
}
.movie-title-box {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
}
.movie-title {
    font-weight: 700;
    font-size: 13px;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
/* TOMBOL FAVORIT — responsif dan presisi */
.fav-btn {
    background: none;
    border: none;
    font-size: 26px;
    color: #5e5e8a;
    cursor: pointer;
    padding: 0;
    width: 34px;
    height: 34px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: 0.2s;
}
.fav-btn.active {
    color: #ff1f3a;
    text-shadow: 0 0 8px #ff1f3a;
}
.fav-btn:active {
    transform: scale(1.2);
}
.movie-tags {
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.tag-prem {
    font-size: 9px;
    font-weight: 800;
    background: rgba(255,31,58,0.15);
    padding: 4px 10px;
    border-radius: 20px;
    color: #ff7d8f;
    border: 0.5px solid rgba(255,31,58,0.4);
}
.tag-free {
    font-size: 9px;
    font-weight: 800;
    background: rgba(30,246,255,0.12);
    padding: 4px 10px;
    border-radius: 20px;
    color: #7ef0ff;
    border: 0.5px solid rgba(30,246,255,0.3);
}
.play-indicator {
    font-size: 9px;
    display: flex;
    align-items: center;
    gap: 4px;
    color: var(--muted);
}

/* ========== TAB TITLE ========== */
.tab-title {
    padding: 24px 20px 16px;
    font-size: 24px;
    font-weight: 800;
    display: flex;
    align-items: center;
    gap: 14px;
}
.tab-title-icon {
    width: 48px;
    height: 48px;
    background: linear-gradient(145deg, #9b6eff, #ff1f3a);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 8px 20px rgba(155,110,255,0.4);
}

/* ========== BOTTOM NAV — premium dock ========== */
.bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 70px;
    background: rgba(10,10,30,0.9);
    backdrop-filter: blur(20px);
    display: flex;
    justify-content: space-around;
    align-items: center;
    border-top: 1px solid rgba(155,110,255,0.25);
    z-index: 1000;
}
.nav-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    color: #6a6a92;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    transition: 0.2s;
}
.nav-item svg {
    width: 24px;
    height: 24px;
    fill: currentColor;
}
.nav-item.active {
    color: white;
    transform: translateY(-4px);
}
.nav-item.active svg {
    fill: url(#navG);
    filter: drop-shadow(0 0 8px #9b6eff);
}

/* ========== PAGINATION ========== */
.pagination {
    display: none;
    justify-content: center;
    align-items: center;
    gap: 15px;
    padding: 8px 18px 28px;
}
.pagination.visible {
    display: flex;
}
.pg-btn {
    width: 46px;
    height: 46px;
    border-radius: 50px;
    background: rgba(20,20,50,0.8);
    border: 1px solid rgba(155,110,255,0.4);
    color: white;
    font-size: 24px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.2s;
}
.pg-btn:active {
    transform: scale(0.92);
    background: rgba(155,110,255,0.3);
}
.pg-info {
    font-weight: 600;
    color: #aaaadd;
}
.empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #6e6e9e;
    display: none;
}

/* ========== RESPONSIVE ========== */
@media (min-width: 520px) {
    .grid-container { grid-template-columns: repeat(3, 1fr); }
}
@media (min-width: 720px) {
    .grid-container { grid-template-columns: repeat(4, 1fr); }
    .hero-banner { height: 300px; }
}
@media (min-width: 1024px) {
    .grid-container { grid-template-columns: repeat(5, 1fr); }
    body { max-width: 1200px; margin: 0 auto; }
}
    </style>
</head>
<body>
<svg width="0" height="0" style="position:absolute"><defs><linearGradient id="navG" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#9b6eff"/><stop offset="100%" stop-color="#ff1f3a"/></linearGradient></defs></svg>

<div id="bgScene">
    <div class="grid-floor"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
    <canvas id="stars" class="star-field"></canvas>
</div>

<div class="header">
    <div class="app-title" id="botTitle">VOD Premium</div>
    <div class="user-profile">
        <div class="user-info-text">
            <span class="user-name" id="userName">Guest</span>
            <span class="user-id" id="userId">ID: -</span>
        </div>
        <img id="userAvatar" class="user-avatar" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="User">
    </div>
</div>

<!-- HOME -->
<div id="view-home" class="view-section active">
    <div class="search-container"><div class="search-wrapper"><input type="text" id="searchInput" class="search-bar" placeholder="Cari film atau serial..."><svg class="search-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg></div></div>
    <div class="filter-container"><button class="filter-btn active" data-filter="all">Semua</button><button class="filter-btn" data-filter="prem">💎 Premium</button><button class="filter-btn" data-filter="free">🆓 Gratis</button></div>
    <div class="hero-wrap"><div class="hero-banner" id="heroBanner"><div class="shimmer" id="heroShimmer" style="position:absolute;inset:0;z-index:1; background: rgba(255,255,255,0.05);"></div><img id="heroImg" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Hero"><div class="hero-overlay"><div class="hero-content"><div class="hero-badge prem" id="heroBadge">PREMIUM</div><h2 class="hero-title" id="heroTitle">Memuat...</h2><button class="hero-cta" id="heroCtaBtn">▶ Tonton Sekarang</button></div></div></div></div>
    <div class="section-label">Katalog Drama</div>
    <div class="grid-container" id="homeGrid"></div>
    <div class="pagination" id="homePagination"><button class="pg-btn" id="homePrev">‹</button><div class="pg-info"><span id="homePageCur">1</span> / <span id="homePageTotal">1</span></div><button class="pg-btn" id="homeNext">›</button></div>
    <div id="homeEmpty" class="empty-state">Data tidak ditemukan.</div>
</div>

<!-- FAV -->
<div id="view-fav" class="view-section"><div class="tab-title"><div class="tab-title-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>Koleksi Saya</div><div class="grid-container" id="favGrid"></div><div class="pagination" id="favPagination"><button class="pg-btn" id="favPrev">‹</button><div class="pg-info"><span id="favPageCur">1</span> / <span id="favPageTotal">1</span></div><button class="pg-btn" id="favNext">›</button></div><div id="favEmpty" class="empty-state">Belum ada favorit. Tekan bintang pada kartu.</div></div>

<!-- HISTORY -->
<div id="view-hist" class="view-section"><div class="tab-title"><div class="tab-title-icon" style="background:linear-gradient(135deg,#1ef6ff,#9b6eff);"><svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg></div>Riwayat Tontonan</div><div class="grid-container" id="histGrid"></div><div class="pagination" id="histPagination"><button class="pg-btn" id="histPrev">‹</button><div class="pg-info"><span id="histPageCur">1</span> / <span id="histPageTotal">1</span></div><button class="pg-btn" id="histNext">›</button></div><div id="histEmpty" class="empty-state">Riwayat kosong. Tonton film untuk mengisi.</div></div>

<div class="bottom-nav"><div class="nav-item active" data-tab="home"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Beranda</span></div><div class="nav-item" data-tab="fav"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg><span>Koleksi</span></div><div class="nav-item" data-tab="hist"><svg viewBox="0 0 24 24"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/></svg><span>Riwayat</span></div></div>

<script>
// STARFIELD (tidak mengganggu fungsi utama)
(function(){ const c=document.getElementById('stars'), ctx=c.getContext('2d'); let W,H, stars=[]; function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; } function drawStar(){ return { x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.5+0.5, a:Math.random(), da:(Math.random()-0.5)*0.006 }; } resize(); for(let i=0;i<150;i++) stars.push(drawStar()); function animate(){ ctx.clearRect(0,0,W,H); stars.forEach(s=>{ s.a+=s.da; if(s.a<0.05) s.da=Math.abs(s.da); if(s.a>0.95) s.da=-Math.abs(s.da); ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(220,220,255,${s.a*0.7})`; ctx.fill(); }); requestAnimationFrame(animate); } animate(); window.addEventListener('resize',resize); })();

const tg = window.Telegram.WebApp; tg.expand();
let botToken = "", dynamicBotUsername = "Bot", catalogData = [], tgPath = "", currentFilter = 'all';
let favorites = JSON.parse(localStorage.getItem('fav_v1')) || [];
let historyList = JSON.parse(localStorage.getItem('hist_v1')) || [];

function hapticLight() { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); }
function hapticHeavy() { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy'); }
function updateStorage(){ localStorage.setItem('fav_v1', JSON.stringify(favorites)); localStorage.setItem('hist_v1', JSON.stringify(historyList)); }

async function initApp(){
    const user = tg.initDataUnsafe?.user;
    if(user){
        document.getElementById('userName').innerText = user.first_name + (user.last_name ? " "+user.last_name : "");
        document.getElementById('userId').innerText = "ID: "+user.id;
        document.getElementById('userAvatar').src = user.photo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.first_name)}&background=1a1a1a&color=fff`;
    }
    const urlParams = new URLSearchParams(window.location.search);
    const encodedPayload = urlParams.get('token');
    if(encodedPayload){
        try{
            const decodedPayload = atob(encodedPayload.replace(/-/g,'+').replace(/_/g,'/'));
            const parts = decodedPayload.split('|');
            botToken = parts[0];
            tgPath = parts[1] || "";
            const res = await fetch(`https://api.telegram.org/bot${botToken}/getMe`);
            const json = await res.json();
            if(json.ok){ dynamicBotUsername = json.result.username; document.getElementById('botTitle').innerText = json.result.first_name; }
        } catch(e){}
    }
    if(!tgPath){ document.getElementById('homeEmpty').innerText = "Sistem Parameter Error."; document.getElementById('homeEmpty').style.display = "block"; return; }
    try{
        if(tgPath.startsWith("B64_")){
            const b64 = tgPath.replace("B64_","").replace(/-/g,'+').replace(/_/g,'/');
            catalogData = JSON.parse(decodeURIComponent(escape(atob(b64))));
        } else {
            const graphRes = await fetch(`https://api.telegra.ph/getPage/${tgPath}?return_content=true`);
            const graphJson = await graphRes.json();
            if(graphJson.ok){
                let finalStr = "";
                graphJson.result.content.forEach(node => { if(node.children) finalStr += node.children[0]; });
                catalogData = JSON.parse(finalStr);
            }
        }
        renderAllTabs();
    } catch(e){ document.getElementById('homeEmpty').innerText = "Gagal membongkar Payload Engine."; document.getElementById('homeEmpty').style.display = "block"; }
}

async function fetchImage(fileId){
    if(!fileId || !botToken) return null;
    const cacheKey = `tg_img_${fileId}`;
    const cached = sessionStorage.getItem(cacheKey);
    if(cached) return cached;
    try{
        const response = await fetch(`https://api.telegram.org/bot${botToken}/getFile?file_id=${fileId}`);
        const json = await response.json();
        if(json.ok && json.result.file_path){
            const url = `https://api.telegram.org/file/bot${botToken}/${json.result.file_path}`;
            sessionStorage.setItem(cacheKey, url);
            return url;
        }
    } catch(e){}
    return null;
}

function escapeHtml(str){ return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

function createCard(item, containerId){
    const card = document.createElement('div');
    card.className = 'movie-card';
    const badgeClass = item.is_prem ? 'tag-prem' : 'tag-free';
    const badgeText = item.is_prem ? 'Premium' : 'Gratis';
    const isFav = favorites.includes(item.id);
    const star = isFav ? '★' : '☆';
    const activeFav = isFav ? 'active' : '';
    card.innerHTML = `
        <div class="movie-poster-container" id="poster-${containerId}-${item.id}">
            <img id="img-${containerId}-${item.id}" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="Poster">
            <div class="play-overlay"><div class="play-overlay-icon"><svg viewBox="0 0 24 24" width="24" height="24" fill="white"><path d="M8 5v14l11-7z"/></svg></div></div>
        </div>
        <div class="movie-info">
            <div class="movie-title-box">
                <div class="movie-title">${escapeHtml(item.t)}</div>
                <button class="fav-btn ${activeFav}" data-id="${item.id}">${star}</button>
            </div>
            <div class="movie-tags">
                <span class="${badgeClass}">${badgeText}</span>
                <span class="play-indicator"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play</span>
            </div>
        </div>
    `;
    const posterDiv = card.querySelector('.movie-poster-container');
    posterDiv.onclick = () => {
        hapticHeavy();
        historyList = [item.id, ...historyList.filter(i => i !== item.id)].slice(0,20);
        updateStorage();
        renderTabHist();
        tg.openTelegramLink(`https://t.me/${dynamicBotUsername}?start=mp_${item.id}`);
        tg.close();
    };
    const favBtn = card.querySelector('.fav-btn');
    const updateBtn = () => {
        const nowFav = favorites.includes(item.id);
        favBtn.innerText = nowFav ? '★' : '☆';
        if(nowFav) favBtn.classList.add('active');
        else favBtn.classList.remove('active');
    };
    updateBtn();
    favBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        hapticLight();
        if(favorites.includes(item.id)){
            favorites = favorites.filter(id => id !== item.id);
        } else {
            favorites.unshift(item.id);
        }
        updateStorage();
        updateBtn();
        if(document.getElementById('view-fav').classList.contains('active')) renderTabFav();
    });
    document.getElementById(containerId).appendChild(card);
    fetchImage(item.p).then(url => {
        if(url){
            const imgEl = document.getElementById(`img-${containerId}-${item.id}`);
            if(imgEl){ imgEl.src = url; imgEl.onload = () => imgEl.classList.add('loaded'); }
        }
    });
}

// PAGINATION
const PAGE_SIZE = 10;
const pgState = { home: { cur:1, items:[] }, fav: { cur:1, items:[] }, hist: { cur:1, items:[] } };
function getColCount(){ let w=window.innerWidth; if(w>=1024) return 5; if(w>=768) return 4; if(w>=520) return 3; return 2; }
function calcPageSize(){ return Math.ceil(PAGE_SIZE / getColCount()) * getColCount(); }
function renderPage(tabKey, gridId, pagId, curSpanId, totalSpanId){
    const ps = pgState[tabKey];
    const size = calcPageSize();
    const total = Math.ceil(ps.items.length / size) || 1;
    ps.cur = Math.min(Math.max(1, ps.cur), total);
    const grid = document.getElementById(gridId);
    grid.innerHTML = '';
    const start = (ps.cur-1)*size;
    ps.items.slice(start, start+size).forEach(item => createCard(item, gridId));
    const pgDiv = document.getElementById(pagId);
    if(total > 1){
        pgDiv.classList.add('visible');
        document.getElementById(curSpanId).innerText = ps.cur;
        document.getElementById(totalSpanId).innerText = total;
        document.getElementById(tabKey+'Prev').disabled = (ps.cur <= 1);
        document.getElementById(tabKey+'Next').disabled = (ps.cur >= total);
    } else pgDiv.classList.remove('visible');
}
function renderTabHome(){
    const query = document.getElementById('searchInput').value.toLowerCase();
    const heroDiv = document.getElementById('heroBanner');
    const emptyDiv = document.getElementById('homeEmpty');
    heroDiv.style.display = 'none'; emptyDiv.style.display = 'none';
    let filtered = catalogData.filter(item => item.t.toLowerCase().includes(query) && (currentFilter === 'all' || (currentFilter === 'prem' && item.is_prem === 1) || (currentFilter === 'free' && item.is_prem === 0)));
    if(!filtered.length){ document.getElementById('homeGrid').innerHTML = ''; document.getElementById('homePagination').classList.remove('visible'); emptyDiv.style.display = 'block'; return; }
    if(query === '' && currentFilter === 'all'){
        const first = filtered[0];
        heroDiv.style.display = 'block';
        document.getElementById('heroTitle').innerText = first.t;
        const badgeSpan = document.getElementById('heroBadge');
        if(first.is_prem){ badgeSpan.className = 'hero-badge prem'; badgeSpan.innerHTML = '<svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg> PREMIUM'; }
        else { badgeSpan.className = 'hero-badge free'; badgeSpan.innerHTML = '✓ GRATIS'; }
        heroDiv.onclick = () => {
            hapticHeavy();
            historyList = [first.id, ...historyList.filter(i => i !== first.id)].slice(0,20);
            updateStorage(); renderTabHist();
            tg.openTelegramLink(`https://t.me/${dynamicBotUsername}?start=mp_${first.id}`); tg.close();
        };
        fetchImage(first.p).then(url => { if(url){ let hi=document.getElementById('heroImg'); hi.src=url; hi.onload=()=>{ hi.classList.add('loaded'); document.getElementById('heroShimmer').style.display='none'; } } });
        filtered = filtered.slice(1);
    }
    pgState.home.items = filtered; pgState.home.cur = 1;
    renderPage('home', 'homeGrid', 'homePagination', 'homePageCur', 'homePageTotal');
}
function renderTabFav(){
    const items = catalogData.filter(i => favorites.includes(i.id)).sort((a,b) => favorites.indexOf(a.id) - favorites.indexOf(b.id));
    const empty = document.getElementById('favEmpty');
    if(!items.length){ document.getElementById('favGrid').innerHTML = ''; document.getElementById('favPagination').classList.remove('visible'); empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    pgState.fav.items = items; pgState.fav.cur = 1;
    renderPage('fav', 'favGrid', 'favPagination', 'favPageCur', 'favPageTotal');
}
function renderTabHist(){
    const items = catalogData.filter(i => historyList.includes(i.id)).sort((a,b) => historyList.indexOf(a.id) - historyList.indexOf(b.id));
    const empty = document.getElementById('histEmpty');
    if(!items.length){ document.getElementById('histGrid').innerHTML = ''; document.getElementById('histPagination').classList.remove('visible'); empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    pgState.hist.items = items; pgState.hist.cur = 1;
    renderPage('hist', 'histGrid', 'histPagination', 'histPageCur', 'histPageTotal');
}
function renderAllTabs(){ renderTabHome(); renderTabFav(); renderTabHist(); }

document.getElementById('searchInput').addEventListener('input', () => renderTabHome());
document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', (e) => { hapticLight(); document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); e.currentTarget.classList.add('active'); currentFilter = e.currentTarget.dataset.filter; renderTabHome(); }));
document.querySelectorAll('.nav-item').forEach(nav => nav.addEventListener('click', (e) => { hapticLight(); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); e.currentTarget.classList.add('active'); const tabId = e.currentTarget.dataset.tab; document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active')); document.getElementById('view-'+tabId).classList.add('active'); if(tabId === 'fav') renderTabFav(); if(tabId === 'hist') renderTabHist(); }));
['home','fav','hist'].forEach(tab => { document.getElementById(tab+'Prev').addEventListener('click', () => { hapticLight(); pgState[tab].cur--; const ids={ grid:tab+'Grid', pg:tab+'Pagination', cur:tab+'PageCur', tot:tab+'PageTotal' }; renderPage(tab, ids.grid, ids.pg, ids.cur, ids.tot); }); document.getElementById(tab+'Next').addEventListener('click', () => { hapticLight(); pgState[tab].cur++; const ids={ grid:tab+'Grid', pg:tab+'Pagination', cur:tab+'PageCur', tot:tab+'PageTotal' }; renderPage(tab, ids.grid, ids.pg, ids.cur, ids.tot); }); });

initApp();
</script>
</body>
</html>
