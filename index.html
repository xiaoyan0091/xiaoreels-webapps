<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>VOD Premium — Next Gen</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(ellipse at 20% 30%, #0B0B1A, #030308);
            color: #f0f0ff;
            overflow-x: hidden;
            padding-bottom: 80px;
        }

        /* ========== 3D COSMIC BACKGROUND ========== */
        .cosmic-bg {
            position: fixed;
            inset: 0;
            z-index: -2;
            overflow: hidden;
        }
        .nebula {
            position: absolute;
            width: 150%;
            height: 150%;
            background: radial-gradient(circle at 30% 40%, rgba(100, 70, 255, 0.08) 0%, rgba(255, 40, 80, 0.05) 50%, transparent 80%);
            animation: nebulaDrift 25s infinite alternate;
        }
        .nebula2 {
            background: radial-gradient(circle at 70% 60%, rgba(30, 200, 255, 0.06), transparent 70%);
            animation: nebulaDrift 35s infinite alternate-reverse;
        }
        @keyframes nebulaDrift {
            0% { transform: translate(0, 0) scale(1); opacity: 0.4; }
            100% { transform: translate(5%, 5%) scale(1.2); opacity: 0.8; }
        }
        .stars-canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }
        .grid-floor {
            position: absolute;
            bottom: -20%;
            left: 50%;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(120, 100, 255, 0.12) 1px, transparent 1px),
                linear-gradient(90deg, rgba(120, 100, 255, 0.12) 1px, transparent 1px);
            background-size: 45px 45px;
            transform: translateX(-50%) rotateX(65deg) translateZ(-30px);
            animation: gridMove 12s linear infinite;
            pointer-events: none;
        }
        @keyframes gridMove {
            0% { transform: translateX(-50%) rotateX(65deg) translateZ(-30px) translateY(0); }
            100% { transform: translateX(-50%) rotateX(65deg) translateZ(-30px) translateY(45px); }
        }

        /* ========== GLASS HEADER ========== */
        .glass-header {
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(16px);
            background: rgba(8, 8, 24, 0.65);
            border-bottom: 1px solid rgba(140, 110, 255, 0.25);
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(125deg, #FFFFFF, #B77CFF, #FF4D6D);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .user-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .user-text {
            text-align: right;
        }
        .user-name {
            font-weight: 700;
            font-size: 0.85rem;
        }
        .user-id {
            font-size: 0.7rem;
            color: #8e8eb0;
        }
        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(135deg, #b77cff, #ff4d6d);
            padding: 2px;
            object-fit: cover;
            box-shadow: 0 0 0 2px rgba(183, 124, 255, 0.3);
        }

        /* ========== SEARCH & FILTER ========== */
        .search-section {
            padding: 20px 18px 8px;
        }
        .search-wrapper {
            position: relative;
        }
        .search-input {
            width: 100%;
            padding: 14px 20px 14px 48px;
            background: rgba(20, 20, 45, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(140, 110, 255, 0.3);
            border-radius: 60px;
            font-size: 0.95rem;
            color: white;
            font-weight: 500;
            outline: none;
            transition: all 0.25s;
        }
        .search-input:focus {
            border-color: #b77cff;
            background: rgba(28, 28, 55, 0.9);
            box-shadow: 0 0 0 3px rgba(183, 124, 255, 0.2);
        }
        .search-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            color: #b77cff;
        }
        .filter-row {
            display: flex;
            gap: 12px;
            padding: 12px 18px;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .chip {
            padding: 8px 22px;
            background: rgba(24, 24, 50, 0.7);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(140, 110, 255, 0.3);
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.8rem;
            color: #bcbce6;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .chip.active {
            background: linear-gradient(105deg, #b77cff, #ff4d6d);
            border: none;
            color: white;
            box-shadow: 0 6px 14px rgba(183, 124, 255, 0.4);
        }

        /* ========== HERO CARD ========== */
        .hero-wrap {
            padding: 8px 18px 20px;
            perspective: 700px;
        }
        .hero {
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            height: 260px;
            cursor: pointer;
            transform: rotateX(2deg);
            transition: transform 0.35s ease, box-shadow 0.3s;
            box-shadow: 0 25px 35px -18px black;
        }
        .hero img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.5s;
        }
        .hero img.loaded { opacity: 1; }
        .hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, #000000cc, #00000055 40%, transparent);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 24px;
        }
        .hero-badge {
            display: inline-flex;
            width: fit-content;
            gap: 8px;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 40px;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        .hero-badge.premium {
            background: rgba(255, 77, 109, 0.2);
            border: 1px solid #ff4d6d;
            color: #ffb0bb;
        }
        .hero-badge.free {
            background: rgba(80, 200, 255, 0.15);
            border: 1px solid #50c8ff;
            color: #b3e4ff;
        }
        .hero-title {
            font-size: 1.8rem;
            font-weight: 800;
            line-height: 1.2;
            text-shadow: 0 2px 10px black;
        }
        .hero-btn {
            margin-top: 14px;
            background: linear-gradient(95deg, #ff4d6d, #ff7b4a);
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 800;
            width: fit-content;
            display: flex;
            gap: 8px;
            align-items: center;
            font-size: 0.8rem;
            box-shadow: 0 5px 12px #ff4d6d40;
        }

        /* ========== SECTION TITLE ========== */
        .section-title {
            display: flex;
            align-items: baseline;
            gap: 12px;
            padding: 6px 20px 12px;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1px;
            color: #9e9ece;
        }
        .section-title span {
            width: 28px;
            height: 3px;
            background: linear-gradient(90deg, #b77cff, #ff4d6d);
            border-radius: 4px;
        }

        /* ========== GRID ========== */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            padding: 0 18px 30px;
        }
        .movie-card {
            background: rgba(12, 12, 30, 0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(140, 110, 255, 0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .movie-card:active { transform: scale(0.97); }
        .poster {
            position: relative;
            width: 100%;
            padding-top: 140%;
            cursor: pointer;
            background: #0a0a1c;
        }
        .poster img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .poster img.loaded { opacity: 1; }
        .play-badge {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0);
            transition: 0.2s;
        }
        .play-icon {
            background: linear-gradient(135deg, #ff4d6d, #ff7b4a);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transform: scale(0.6);
        }
        .poster:active .play-badge { background: rgba(0,0,0,0.4); }
        .poster:active .play-icon { opacity: 1; transform: scale(1); }
        .movie-info {
            padding: 12px;
        }
        .title-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .movie-name {
            font-weight: 700;
            font-size: 0.85rem;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .fav-star {
            background: none;
            border: none;
            font-size: 1.7rem;
            color: #6a6a9a;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }
        .fav-star.active {
            color: #ff4d6d;
            text-shadow: 0 0 6px #ff4d6d;
        }
        .tags {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .premium-tag {
            background: rgba(255, 77, 109, 0.12);
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            color: #ff9aab;
        }
        .free-tag {
            background: rgba(80, 200, 255, 0.12);
            padding: 4px 10px;
            border-radius: 50px;
            font-size: 0.7rem;
            font-weight: 800;
            color: #8fd8ff;
        }
        .play-hint {
            display: flex;
            gap: 4px;
            align-items: center;
            font-size: 0.7rem;
            color: #7c7caa;
        }

        /* ========== BOTTOM NAVIGATION ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: rgba(8, 8, 24, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(140, 110, 255, 0.3);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 200;
            padding-bottom: env(safe-area-inset-bottom);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #73739e;
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        .nav-item svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        .nav-item.active {
            color: white;
            transform: translateY(-4px);
        }
        .nav-item.active svg {
            fill: url(#navGradient);
            filter: drop-shadow(0 0 6px #b77cff);
        }

        /* Pagination */
        .pagination {
            display: none;
            justify-content: center;
            gap: 16px;
            padding: 8px 20px 32px;
        }
        .pagination.visible { display: flex; }
        .page-btn {
            width: 44px;
            height: 44px;
            border-radius: 60px;
            background: rgba(25, 25, 55, 0.8);
            border: 1px solid #4a4a7a;
            color: white;
            font-size: 1.4rem;
            font-weight: bold;
            cursor: pointer;
        }
        .page-info {
            font-weight: 600;
            color: #a2a2ce;
        }
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #7a7aa5;
            display: none;
        }

        @media (min-width: 540px) {
            .movies-grid { grid-template-columns: repeat(3,1fr); }
        }
        @media (min-width: 740px) {
            .movies-grid { grid-template-columns: repeat(4,1fr); }
            .hero { height: 300px; }
        }
        @media (min-width: 1024px) {
            .movies-grid { grid-template-columns: repeat(5,1fr); }
            body { max-width: 1280px; margin: 0 auto; }
        }
    </style>
</head>
<body>
<svg width="0" height="0" style="position:absolute"><defs><linearGradient id="navGradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#b77cff"/><stop offset="100%" stop-color="#ff4d6d"/></linearGradient></defs></svg>

<div class="cosmic-bg">

            <svg class="search-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>

<script>
    (function starfield() {
        const canvas = document.getElementById('starCanvas');
        if(!canvas) return;
        const ctx = canvas.getContext('2d');
        let w,h, stars = [];
        function resize() { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; }
        function makeStar() { return { x: Math.random() * w, y: Math.random() * h, r: Math.random() * 1.8 + 0.8, a: Math.random(), da: (Math.random() - 0.5) * 0.008 }; }
        resize();
        for(let i=0;i<220;i++) stars.push(makeStar());
        function draw() {
            ctx.clearRect(0,0,w,h);
            for(let s of stars) {
                s.a += s.da;
                if(s.a<0.1) s.da = Math.abs(s.da);
                if(s.a>0.9) s.da = -Math.abs(s.da);
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                ctx.fillStyle = `rgba(255, 240, 255, ${s.a * 0.6})`;
                ctx.fill();
            }
            requestAnimationFrame(draw);
        }
        draw();
        window.addEventListener('resize', () => { resize(); stars = []; for(let i=0;i<220;i++) stars.push(makeStar()); });
    })();

    const tg = window.Telegram.WebApp;
    tg.expand();
    let botToken = "", botUsername = "Bot", catalogData = [], tgPath = "", currentFilter = "all";
    let favorites = JSON.parse(localStorage.getItem('fav_v2')) || [];
    let historyList = JSON.parse(localStorage.getItem('hist_v2')) || [];

    function lightHaptic() { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); }
    function heavyHaptic() { if(tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy'); }
    function saveStorage() { localStorage.setItem('fav_v2', JSON.stringify(favorites)); localStorage.setItem('hist_v2', JSON.stringify(historyList)); }

    async function init() {
        const user = tg.initDataUnsafe?.user;
        if(user) {
            document.getElementById('userName').innerText = user.first_name + (user.last_name ? " "+user.last_name : "");
            document.getElementById('userId').innerText = "ID: "+user.id;
            document.getElementById('userAvatar').src = user.photo_url || `https://ui-avatars.com/api/?name=${encodeURIComponent(user.first_name)}&background=2c2c54&color=fff&length=1`;
        }
        const params = new URLSearchParams(window.location.search);
        const tokenEnc = params.get('token');
        if(tokenEnc) {
            try {
                const decoded = atob(tokenEnc.replace(/-/g,'+').replace(/_/g,'/'));
                const parts = decoded.split('|');
                botToken = parts[0];
                tgPath = parts[1] || "";
                const resp = await fetch(`https://api.telegram.org/bot${botToken}/getMe`);
                const json = await resp.json();
                if(json.ok) { botUsername = json.result.username; document.querySelector('.logo').innerText = json.result.first_name || "VOD PREMIUM"; }
            } catch(e) {}
        }
        if(!tgPath) { document.getElementById('homeEmpty').innerText = "Parameter error."; document.getElementById('homeEmpty').style.display = "block"; return; }
        try {
            if(tgPath.startsWith("B64_")) {
                const b64 = tgPath.slice(4).replace(/-/g,'+').replace(/_/g,'/');
                catalogData = JSON.parse(decodeURIComponent(escape(atob(b64))));
            } else {
                const graph = await fetch(`https://api.telegra.ph/getPage/${tgPath}?return_content=true`);
                const data = await graph.json();
                if(data.ok) {
                    let raw = "";
                    data.result.content.forEach(node => { if(node.children) raw += node.children[0]; });
                    catalogData = JSON.parse(raw);
                }
            }
            renderAll();
        } catch(e) { document.getElementById('homeEmpty').innerText = "Gagal muat data."; document.getElementById('homeEmpty').style.display = "block"; }
    }

    async function fetchImage(fileId) {
        if(!fileId || !botToken) return null;
        const cache = sessionStorage.getItem(`img_${fileId}`);
        if(cache) return cache;
        try {
            const res = await fetch(`https://api.telegram.org/bot${botToken}/getFile?file_id=${fileId}`);
            const json = await res.json();
            if(json.ok && json.result.file_path) {
                const url = `https://api.telegram.org/file/bot${botToken}/${json.result.file_path}`;
                sessionStorage.setItem(`img_${fileId}`, url);
                return url;
            }
        } catch(e) {}
        return null;
    }

    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

    function createCard(item, containerId) {
        const card = document.createElement('div');
        card.className = 'movie-card';
        const isFav = favorites.includes(item.id);
        const starSym = isFav ? '★' : '☆';
        const activeFav = isFav ? 'active' : '';
        const tagClass = item.is_prem ? 'premium-tag' : 'free-tag';
        const tagText = item.is_prem ? '🔮 PREMIUM' : '✨ GRATIS';
        card.innerHTML = `
            <div class="poster" data-id="${item.id}">
                <img id="img-${containerId}-${item.id}" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=" alt="poster">
                <div class="play-badge"><div class="play-icon"><svg width="24" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg></div></div>
            </div>
            <div class="movie-info">
                <div class="title-row">
                    <div class="movie-name">${escapeHtml(item.t)}</div>
                    <button class="fav-star ${activeFav}" data-id="${item.id}">${starSym}</button>
                </div>
                <div class="tags">
                    <span class="${tagClass}">${tagText}</span>
                    <span class="play-hint"><svg width="12" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg> Play</span>
                </div>
            </div>
        `;
        const posterDiv = card.querySelector('.poster');
        posterDiv.onclick = () => {
            heavyHaptic();
            historyList = [item.id, ...historyList.filter(i => i !== item.id)].slice(0,20);
            saveStorage();
            if(document.getElementById('view-hist').classList.contains('active')) renderTabHist();
            tg.openTelegramLink(`https://t.me/${botUsername}?start=mp_${item.id}`);
            tg.close();
        };
        const starBtn = card.querySelector('.fav-star');
        const updateStar = () => {
            const nowFav = favorites.includes(item.id);
            starBtn.innerText = nowFav ? '★' : '☆';
            if(nowFav) starBtn.classList.add('active');
            else starBtn.classList.remove('active');
        };
        updateStar();
        starBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            lightHaptic();
            if(favorites.includes(item.id)) favorites = favorites.filter(id => id !== item.id);
            else favorites.unshift(item.id);
            saveStorage();
            updateStar();
            if(document.getElementById('view-fav').classList.contains('active')) renderTabFav();
        });
        document.getElementById(containerId).appendChild(card);
        fetchImage(item.p).then(url => {
            if(url) {
                const imgEl = document.getElementById(`img-${containerId}-${item.id}`);
                if(imgEl) { imgEl.src = url; imgEl.onload = () => imgEl.classList.add('loaded'); }
            }
        });
    }

    // PAGINATION 
    const PAGE_SIZE = 10;
    const pgState = { home: { cur:1, items:[] }, fav: { cur:1, items:[] }, hist: { cur:1, items:[] } };
    function getCols() { const w=window.innerWidth; if(w>=1024) return 5; if(w>=740) return 4; if(w>=540) return 3; return 2; }
    function getPageSize() { return Math.ceil(PAGE_SIZE / getCols()) * getCols(); }
    function renderPage(tab, gridId, pagId, curSpan, totalSpan) {
        const state = pgState[tab];
        const size = getPageSize();
        const total = Math.ceil(state.items.length / size) || 1;
        state.cur = Math.min(total, Math.max(1, state.cur));
        const grid = document.getElementById(gridId);
        grid.innerHTML = '';
        const start = (state.cur-1)*size;
        state.items.slice(start, start+size).forEach(item => createCard(item, gridId));
        const pagDiv = document.getElementById(pagId);
        if(total > 1) {
            pagDiv.classList.add('visible');
            document.getElementById(curSpan).innerText = state.cur;
            document.getElementById(totalSpan).innerText = total;
            document.getElementById(tab+'Prev').disabled = (state.cur <= 1);
            document.getElementById(tab+'Next').disabled = (state.cur >= total);
        } else pagDiv.classList.remove('visible');
    }

    function renderTabHome() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const heroDiv = document.getElementById('heroBanner');
        const emptyDiv = document.getElementById('homeEmpty');
        heroDiv.style.display = 'none';
        emptyDiv.style.display = 'none';
        let filtered = catalogData.filter(item => item.t.toLowerCase().includes(search) && (currentFilter === 'all' || (currentFilter === 'prem' && item.is_prem===1) || (currentFilter === 'free' && item.is_prem===0)));
        if(!filtered.length) { document.getElementById('homeGrid').innerHTML = ''; document.getElementById('homePagination').classList.remove('visible'); emptyDiv.style.display = 'block'; emptyDiv.innerText = 'Tidak ada hasil.'; return; }
        if(search === '' && currentFilter === 'all') {
            const first = filtered[0];
            heroDiv.style.display = 'block';
            document.getElementById('heroTitle').innerText = first.t;
            const badge = document.getElementById('heroBadge');
            if(first.is_prem) { badge.className = 'hero-badge premium'; badge.innerHTML = '⭐ PREMIUM'; }
            else { badge.className = 'hero-badge free'; badge.innerHTML = '✓ GRATIS'; }
            heroDiv.onclick = () => {
                heavyHaptic();
                historyList = [first.id, ...historyList.filter(i => i !== first.id)].slice(0,20);
                saveStorage(); if(document.getElementById('view-hist').classList.contains('active')) renderTabHist();
                tg.openTelegramLink(`https://t.me/${botUsername}?start=mp_${first.id}`); tg.close();
            };
            fetchImage(first.p).then(url => { if(url){ let hi=document.getElementById('heroImg'); hi.src=url; hi.onload=()=>{ hi.classList.add('loaded'); document.getElementById('heroShimmer').style.display='none'; } } });
            filtered = filtered.slice(1);
        }
        pgState.home.items = filtered; pgState.home.cur = 1;
        renderPage('home', 'homeGrid', 'homePagination', 'homePageCur', 'homePageTotal');
    }
    function renderTabFav() {
        const items = catalogData.filter(i => favorites.includes(i.id)).sort((a,b)=>favorites.indexOf(a.id)-favorites.indexOf(b.id));
        const empty = document.getElementById('favEmpty');
        if(!items.length) { document.getElementById('favGrid').innerHTML = ''; document.getElementById('favPagination').classList.remove('visible'); empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        pgState.fav.items = items; pgState.fav.cur = 1;
        renderPage('fav', 'favGrid', 'favPagination', 'favPageCur', 'favPageTotal');
    }
    function renderTabHist() {
        const items = catalogData.filter(i => historyList.includes(i.id)).sort((a,b)=>historyList.indexOf(a.id)-historyList.indexOf(b.id));
        const empty = document.getElementById('histEmpty');
        if(!items.length) { document.getElementById('histGrid').innerHTML = ''; document.getElementById('histPagination').classList.remove('visible'); empty.style.display = 'block'; return; }
        empty.style.display = 'none';
        pgState.hist.items = items; pgState.hist.cur = 1;
        renderPage('hist', 'histGrid', 'histPagination', 'histPageCur', 'histPageTotal');
    }
    function renderAll() { renderTabHome(); renderTabFav(); renderTabHist(); }

    document.getElementById('searchInput').addEventListener('input', () => renderTabHome());
    document.querySelectorAll('.chip').forEach(btn => btn.addEventListener('click', (e) => {
        lightHaptic();
        document.querySelectorAll('.chip').forEach(b => b.classList.remove('active'));
        e.currentTarget.classList.add('active');
        currentFilter = e.currentTarget.dataset.filter;
        renderTabHome();
    }));
    document.querySelectorAll('.nav-item').forEach(nav => nav.addEventListener('click', (e) => {
        lightHaptic();
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        e.currentTarget.classList.add('active');
        const tab = e.currentTarget.dataset.tab;
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById(`view-${tab}`).classList.add('active');
        if(tab === 'fav') renderTabFav();
        if(tab === 'hist') renderTabHist();
    }));
    ['home','fav','hist'].forEach(tab => {
        document.getElementById(`${tab}Prev`).addEventListener('click', () => { lightHaptic(); pgState[tab].cur--; const p = { grid:tab+'Grid', pag:tab+'Pagination', cur:tab+'PageCur', tot:tab+'PageTotal' }; renderPage(tab, p.grid, p.pag, p.cur, p.tot); });
        document.getElementById(`${tab}Next`).addEventListener('click', () => { lightHaptic(); pgState[tab].cur++; const p = { grid:tab+'Grid', pag:tab+'Pagination', cur:tab+'PageCur', tot:tab+'PageTotal' }; renderPage(tab, p.grid, p.pag, p.cur, p.tot); });
    });
    init();
</script>
</body>
</html>
